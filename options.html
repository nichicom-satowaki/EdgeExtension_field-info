<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Info Helper - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Field Info Helper - 設定</h1>
      <p>各ボタンで使用するDTO名を設定できます</p>
    </header>

    <main>
      <div class="section">
        <h2>現在の設定</h2>
        <p class="description">各ボタンが使用するDTO名を表示しています。編集機能は現在無効化されています。</p>
        
        <div class="form-group">
          <label>運用管理ボタン:</label>
          <div class="readonly-value" id="unyou-value">未設定</div>
        </div>
        
        <div class="form-group">
          <label>予防接種ボタン:</label>
          <div class="readonly-value" id="yobou-value">未設定</div>
        </div>
        
        <div class="form-group">
          <label>成人保健ボタン:</label>
          <div class="readonly-value" id="seijin-value">未設定</div>
        </div>
        
        <div class="form-group">
          <label>母子保健ボタン:</label>
          <div class="readonly-value" id="boshi-value">A103PregnancyDto</div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
