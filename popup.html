<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Info Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Field Info Helper</h1>
    
    <!-- カテゴリボタン表示エリア -->
    <div class="buttons" id="category-buttons">
      <!-- JavaScriptで動的に生成 -->
    </div>
    
    <!-- サブアイテム表示エリア(最初は非表示) -->
    <div class="sub-items" id="sub-items-container" style="display: none;">
      <button class="back-button" id="back-button">← 戻る</button>
      <h2 id="sub-items-title"></h2>
      <div class="sub-items-list" id="sub-items-list">
        <!-- JavaScriptで動的に生成 -->
      </div>
    </div>
    
    <div class="config-info">
      <small id="config-status">設定読み込み中...</small>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
